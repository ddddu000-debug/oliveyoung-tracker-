name: 올리브영 랭킹 일일 수집

on:
  schedule:
    - cron: '0 0 * * *'   # 매일 오전 9시 (한국시간 = UTC 00:00)
  workflow_dispatch:        # 버튼 클릭으로 수동 실행도 가능

# GitHub Pages 배포 권한
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      # 1. 코드 가져오기
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      # 2. Node.js 설치
      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. 패키지 설치
      - name: 패키지 설치
        run: npm install

      # 4. Playwright 브라우저 설치
      - name: Playwright 브라우저 설치
        run: npx playwright install chromium --with-deps

      # 5. 환경 변수 파일 생성 (Supabase + Google Sheets)
      - name: .env 파일 생성
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}" >> .env
          echo "GOOGLE_SHEETS_ID=${{ secrets.GOOGLE_SHEETS_ID }}" >> .env
          echo "GOOGLE_APPLICATION_CREDENTIALS=google-credentials.json" >> .env

      # 6. Google 서비스 계정 인증 파일 생성
      - name: Google 인증 파일 생성
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > google-credentials.json

      # 7. 수집 실행
      - name: 랭킹 수집 실행
        run: node src/runner.js

      # 8. 생성된 dashboard.html을 docs/ 폴더로 복사
      - name: 대시보드 파일 준비
        run: |
          mkdir -p docs
          cp dashboard.html docs/index.html

      # 9. docs/ 폴더를 GitHub Pages에 배포
      - name: GitHub Pages 배포
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages

      # 10. 실패 시 스크린샷 업로드 (디버깅용)
      - name: 실패 시 스크린샷 저장
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: debug/
          retention-days: 7
